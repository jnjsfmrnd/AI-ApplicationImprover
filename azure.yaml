# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: ai-application-improver
metadata:
  template: ai-application-improver@0.0.1

infra:
  provider: bicep
  path: infra
  module: main

services:
  backend:
    project: ./backend
    language: python
    host: appservice

  frontend:
    project: ./frontend
    dist: dist
    language: js
    host: staticwebapp

workflows:
  up:
    steps:
      - azd: provision
      - azd: package
      - azd: deploy --all

